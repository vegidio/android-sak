build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15

naming:
  FunctionNaming:
    # Allow Compose PascalCase function names
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

style:
  MagicNumber:
    ignoreNumbers: ['-1', '0', '1', '2']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
  WildcardImport:
    active: true
  MaxLineLength:
    maxLineLength: 120
    excludeCommentStatements: true
  ReturnCount:
    max: 4

