config:
  validation: true
  warningsAsErrors: false

complexity:
  LongMethod:
    allowedLines: 60
  LongParameterList:
    allowedFunctionParameters: 8
    allowedConstructorParameters: 8
  TooManyFunctions:
    allowedFunctionsPerFile: 20
    allowedFunctionsPerClass: 15

naming:
  FunctionNaming:
    # Allow Compose PascalCase function names
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

style:
  ForbiddenComment:
    active: false
  NewLineAtEndOfFile:
    active: false
  MagicNumber:
    ignoreNumbers: ['-1', '0', '1', '2']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
  WildcardImport:
    active: true
  MaxLineLength:
    maxLineLength: 120
    excludeCommentStatements: true
  ReturnCount:
    active: false
